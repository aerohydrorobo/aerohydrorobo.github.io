name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # ডেপ্রিকেশন ওয়ার্নিং এড়াতে লেটেস্ট স্টেবল ভার্সন
          cache: 'npm'

      - name: Install dependencies
        run: npm install # npm ci এর বদলে স্ট্যান্ডার্ড ইনস্টল ব্যবহার করছি যেন কোনো ফাইল মিসিং না হয়

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
